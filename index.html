<!DOCTYPE html>
<html lang="pt-BR" id="html">
<head>
  <meta charset="UTF-8">
  <title>Drivn</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="drivn-app-icon.png" type="image/png">
</head>
<body>
<h1 data-pt-br="Bem vindo" data-en="Welcome"></h1>
  <div id="Configuração">
    <div id="Lingua_config">
      <button id="Lingua" data-code="btn" onclick="toggleLang()"></button>
    </div>
  </div>

  <div id="Tela-login">
    <div id="g_id_onload"
      data-client_id="1053709473946-e9brjikoia5rn2d519nvcb89l8kid7h5.apps.googleusercontent.com"
      data-callback="handleLogin">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-locale="pt-BR">
    </div>
  </div>

  <div id="Tela-principal" style="display: none">
    <h1>Bem vindo!</h1>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    let lang = 'pt-BR';

    function handleLogin(response) {
      const usuario = JSON.parse(atob(response.credential.split('.')[1]));
      document.getElementById('Tela-login').style.display = 'none';
      document.getElementById('Tela-principal').style.display = 'block';
    }

    function toggleLang() {
      lang = lang === 'pt-BR' ? 'en' : 'pt-BR';
      document.getElementById('html').lang = lang;
      document.querySelectorAll('[data-code]').forEach(el => {
        el.textContent = lang === 'pt-BR' ? el.dataset.pt : el.dataset.en;
      });
      document.querySelector('button').textContent =
        lang === 'pt-BR' ? '🇺🇸 English' : '🇧🇷 Português';
    }

    toggleLang(); toggleLang();
  </script>

</body>
</html>
