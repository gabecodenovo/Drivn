<!DOCTYPE html>
<html lang="pt-BR" id="html">
<head>
  <meta charset="UTF-8">
  <title>Drivn</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="drivn-app-icon.png" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Modak&family=Oi&family=Oswald:wght@200..700&family=Supermercado+One&display=swap" rel="stylesheet">
</head>
<body>

  <div id="Configuração">
  <div id="Lingua-config" style="display: none">
      <button id="Lingua" data-code="btn" onclick="toggleLang()"></button>
    </div>
  </div>

<div id="Tela-login">

  <div id="caixa-login">
 <img src="./assets/a16698b6-9e1c-49af-9a21-8df69f720cb3 (1).jpg" alt="Logo" id="Logo-login">
    <h1>Drivn</h1>
    <h1 style="margin-bottom: 20px" data-code="Drivn"></h1>
    <p data-code="Organize sua mente. Domine seu tempo." data-pt="Organize sua mente. Domine seu tempo." data-en="Organize your mind. Master your time."></p>
    <p style="margin-bottom: 20px" data-pt="Organize sua mente. Domine seu tempo.">
    <p data-code="Entrar com Google:" data-pt="Entrar com Google:" data-en="Sign in with Google:"></p>
    <div id="g_id_onload"
      data-client_id="1053709473946-e9brjikoia5rn2d519nvcb89l8kid7h5.apps.googleusercontent.com"
      data-callback="handleLogin">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-locale="pt-BR">
    </div>
  </div>
</div>
  <div id="Tela-principal" style="display: none">
 <img id="foto-usuario">
  <p id="nome-usuario"></p>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
   let lang = 'pt-BR';

function handleLogin(response) {
  const usuario = JSON.parse(atob(response.credential.split('.')[1]));
  document.getElementById('nome-usuario').textContent = usuario.name;
  document.getElementById('foto-usuario').src = usuario.picture;
  document.getElementById('Tela-login').style.display = 'none';
  document.getElementById('Tela-principal').style.display = 'block';
}

function toggleLang() {
  lang = lang === 'pt-BR' ? 'en' : 'pt-BR';
  document.getElementById('html').lang = lang;
  document.querySelectorAll('[data-code]').forEach(el => {
    el.textContent = lang === 'pt-BR' ? el.dataset.pt : el.dataset.en;
  });
  document.querySelector('button').textContent =
    lang === 'pt-BR' ? '🇺🇸 English' : '🇧🇷 Português';
}

toggleLang(); toggleLang();
  </script>

</body>
</html>
