<!DOCTYPE html>
<html lang="pt-BR" id="html">
<head>
  <meta charset="UTF-8">
  <title>Drivn</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="drivn-app-icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Modak&family=Oi&family=Oswald:wght@200..700&family=Supermercado+One&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div id="barra-nav">
    <img src="./assets/a16698b6-9e1c-49af-9a21-8df69f720cb3 (1).jpg" alt="Logo" id="Logo-barra">
    <div id="Lingua-config">
      <button id="Lingua" onclick="toggleLang()"></button>
    </div>
    <img id="foto-usuario">
    <p id="nome-usuario"></p>
    <button id="btn-sair" style="display:none" onclick="sair()">Sair</button>
    <button id="btn-salvar" style="display:none" onclick="salvarConta()">Salvar Conta</button>
  </div>

  <div id="Tela-login">
    <div id="caixa-login">
      <img src="./assets/a16698b6-9e1c-49af-9a21-8df69f720cb3 (1).jpg" alt="Logo" id="Logo-login">
      <h1>Drivn</h1>
      <p data-pt="Organize sua mente. Domine seu tempo." data-en="Organize your mind. Master your time."></p>
      <p data-pt="Entrar com Google:" data-en="Sign in with Google:"></p>
      <div id="g_id_onload"
        data-client_id="1053709473946-e9brjikoia5rn2d519nvcb89l8kid7h5.apps.googleusercontent.com"
        data-callback="handleLogin">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-locale="pt-BR">
      </div>
    </div>
  </div>

  <div id="Tela-principal" style="display:none"></div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    let lang = 'pt-BR';
    let emailUsuario = '';

    window.onload = function () {
      const nome = localStorage.getItem('nome');
      const foto = localStorage.getItem('foto');
      const email = localStorage.getItem('email');

      if (nome && foto && email) {
        emailUsuario = email;
        document.getElementById('nome-usuario').textContent = nome;
        document.getElementById('foto-usuario').src = foto;
        mostrarTelaPrincipal();
      }

      toggleLang(); toggleLang();
    }

    function handleLogin(response) {
      const usuario = JSON.parse(atob(response.credential.split('.')[1]));
      emailUsuario = usuario.email;
      document.getElementById('nome-usuario').textContent = usuario.name;
      document.getElementById('foto-usuario').src = usuario.picture;
      mostrarTelaPrincipal();
    }

    function mostrarTelaPrincipal() {
      document.getElementById('Tela-login').style.display = 'none';
      document.getElementById('Tela-principal').style.display = 'block';
      document.getElementById('btn-sair').style.display = 'inline-block';
      document.getElementById('btn-salvar').style.display = 'inline-block';
    }

    function sair() {
      google.accounts.id.revoke(emailUsuario, () => {
        google.accounts.id.disableAutoSelect();
        localStorage.removeItem('nome');
        localStorage.removeItem('foto');
        localStorage.removeItem('email');
        emailUsuario = '';
        document.getElementById('Tela-principal').style.display = 'none';
        document.getElementById('Tela-login').style.display = 'block';
        document.getElementById('btn-sair').style.display = 'none';
        document.getElementById('btn-salvar').style.display = 'none';
      });
    }

    function salvarConta() {
      localStorage.setItem('nome', document.getElementById('nome-usuario').textContent);
      localStorage.setItem('foto', document.getElementById('foto-usuario').src);
      localStorage.setItem('email', emailUsuario);
      alert('Conta salva! Na próxima vez você já entra direto.');
    }

    function toggleLang() {
      lang = lang === 'pt-BR' ? 'en' : 'pt-BR';
      document.getElementById('html').lang = lang;
      document.querySelectorAll('[data-pt]').forEach(el => {
        el.textContent = lang === 'pt-BR' ? el.dataset.pt : el.dataset.en;
      });
      document.getElementById('Lingua').textContent =
        lang === 'pt-BR' ? '🇺🇸 English' : '🇧🇷 Português';
    }
  </script>
</body>
</html>
