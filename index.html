<!DOCTYPE html>
<html lang="pt-BR" id="html">
<head>
  <meta charset="UTF-8">
  <title>Drivn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="Lingua" data-code="btn" onclick="toggleLang()"></button>

  <script>
    let lang = 'pt-BR';

    function toggleLang() {
      lang = lang === 'pt-BR' ? 'en' : 'pt-BR';
      document.getElementById('html').lang = lang;

      document.querySelectorAll('[data-code]').forEach(el => {
        el.textContent = lang === 'pt-BR' ? el.dataset.pt : el.dataset.en;
      });

      document.querySelector('button').textContent =
        lang === 'pt-BR' ? '🇺🇸 English' : '🇧🇷 Português';
    }

    toggleLang(); toggleLang();
  </script>

</body>
</html>
